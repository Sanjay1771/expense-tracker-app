org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Fix: Disable Kotlin incremental compilation to prevent cross-drive cache errors
# (Pub cache on C: drive, project on D: drive — Kotlin can't compute relative paths)
kotlin.incremental=false

# Enable Gradle build caching for faster rebuilds
org.gradle.caching=true

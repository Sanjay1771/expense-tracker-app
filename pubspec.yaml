name: my_first_app
description: "Expense Tracker App - Track your income and expenses"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^1.2.0
  sqflite: ^2.4.2
  path: ^1.9.1
  intl: ^0.20.2
  google_fonts: ^8.0.2
  shared_preferences: ^2.3.5
  crypto: ^3.0.7
  pdf: ^3.11.1
  printing: ^5.12.0
  path_provider: ^2.1.3
  google_generative_ai: ^0.4.5
  flutter_local_notifications: ^17.0.0
  workmanager: ^0.9.0
  table_calendar: ^3.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
